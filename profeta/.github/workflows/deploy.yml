name: Deploy Profeta Bot

on:
  push:
    branches:
      - hotfix/production-safe

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/profeta
            git pull origin hotfix/production-safe
            sudo systemctl restart profeta-bot